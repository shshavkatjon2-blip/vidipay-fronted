* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
}

body {
    background: radial-gradient(circle, #1a1a2e 0%, #0f0c1b 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.game-container {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

.user-info {
    font-size: 18px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 16px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    margin-top: 10px;
}

.balance-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: -20px;
}

.balance-icon {
    width: 45px;
    height: 45px;
    animation: pulse 2s infinite;
}

#balance {
    font-size: 42px;
    font-weight: 800;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}

.coin-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-grow: 1;
}

.coin-button {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s ease;
    display: flex;
    justify-content: center;
    align-items: center;
}

.coin-button img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
}

.coin-button:active {
    transform: scale(0.92);
}

.energy-container {
    width: 100%;
    margin-bottom: 30px;
    padding: 0 10px;
}

.energy-text {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: left;
}

.progress-bar {
    width: 100%;
    height: 14px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.progress-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ffd700 0%, #ff8800 100%);
    border-radius: 10px;
    transition: width 0.1s linear;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
