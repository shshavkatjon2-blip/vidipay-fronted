name: Frontend Admin Static Guard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-admin-static-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify frontend/admin files
        run: node verify-frontend-admin-static-1_5m.js
